npmRebuild: false
appId: pro.intellinside.batterystatus
productName: Battery Status
copyright: Copyright © 2026 intellinside
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
extraResources:
  - from: src/main/scripts
    to: scripts
    filter:
      - "devicehelper.exe"
win:
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: intellinside
  repo: battery-status
